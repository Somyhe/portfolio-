<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found · Sumayah Alwadei</title>
  <link rel="icon" type="image/png" href="images/logo w.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-404{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:1.2rem}
    .err-num{font-family:'Bodoni Moda',Georgia,serif;font-size:clamp(6rem,20vw,14rem);font-style:italic;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--ac1),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.25}
    .err-title{font-family:var(--ff-display);font-size:clamp(1.4rem,3vw,2rem);font-weight:600;color:var(--t1);margin-top:-1rem}
    .err-sub{color:var(--t3);font-size:.95rem;max-width:360px;line-height:1.75}
    .err-btn{margin-top:1rem}
  </style>
</head>
<body data-theme="light">

<div class="mesh-bg">
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
</div>

<div class="page-404">
  <div class="err-num">404</div>
  <h1 class="err-title">Page Not Found</h1>
  <p class="err-sub">The page you're looking for doesn't exist or has been moved.</p>
  <div class="err-btn">
    <a href="index.html" class="btn btn-p">← Back to Home</a>
  </div>
</div>

<script>
  const saved = localStorage.getItem('theme');
  if (saved) document.body.setAttribute('data-theme', saved);
</script>
</body>
</html>
